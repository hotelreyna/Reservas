<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f0f5;color:#1a1a2e;min-height:100vh;font-size:15px}
:root{--ink:#1a1a2e;--ink2:#4a4a6a;--ink3:#8888aa;--card:#fff;--surface:#f0f0f5;--accent:#2563eb;--accent2:#1d4ed8;--ok:#059669;--warn:#d97706;--danger:#dc2626;--border:#e0e0ee;--r:12px}

/* TOPBAR */
.topbar{background:var(--card);border-bottom:.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:10px}
.brand{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:10px}
.session-btn{background:none;border:.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--ink2);font-family:inherit;display:flex;align-items:center;gap:5px}
.session-btn:hover{background:var(--border)}
.session-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sync{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink3)}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.sdot.ok{background:var(--ok)}.sdot.load{background:var(--warn);animation:blink 1s infinite}.sdot.err{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:18px 16px}

/* CALENDAR */
.cal-wrap{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:17px;font-weight:700;color:var(--ink)}
.cal-arrows{display:flex;gap:6px}
.ca{background:none;border:.5px solid var(--border);border-radius:7px;width:32px;height:32px;cursor:pointer;color:var(--ink2);font-size:17px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.ca:hover{background:var(--border)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.clabel{text-align:center;font-size:11px;font-weight:700;color:var(--ink3);padding:4px 0;text-transform:uppercase;letter-spacing:.05em}
.cday{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:5px 2px;cursor:pointer;border:.5px solid transparent;transition:all .12s;min-height:46px}
.cday:hover:not(.empty):not(.past){background:#dbeafe;border-color:#93c5fd}
.cday.today{background:#dbeafe;border-color:var(--accent)}
.cday.today .dn{color:var(--accent);font-weight:700}
.cday.sel{border-color:var(--accent);background:#eff6ff}
.cday.hasr{background:#f0fdf4}
.cday.empty,.cday.past{opacity:.35;cursor:default}
.cday.past:hover{background:none;border-color:transparent}
.dn{font-size:13px;font-weight:500;color:var(--ink2);line-height:1}
.ddots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:3px}
.ddot{width:5px;height:5px;border-radius:50%}

/* MOBILE CALENDAR */
.cal-mobile{display:none}
.day-row{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s}
.day-row:hover{border-color:#93c5fd}
.day-row.today-row{border-color:var(--accent);background:#eff6ff}
.day-row.sel-row{border-color:var(--accent);background:#eff6ff}
.day-label{font-size:15px;font-weight:600;color:var(--ink)}
.day-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.day-dots-row{display:flex;gap:4px;align-items:center}

/* DAY PANEL */
.day-panel{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.dp-title{font-size:16px;font-weight:700;color:var(--ink)}
.dp-sub{font-size:13px;color:var(--ink3);margin-top:2px}

/* HAB STATUS */
.hab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.hab-chip{border-radius:9px;padding:10px 12px;font-size:13px;font-weight:600;text-align:center;border:.5px solid transparent}
.hab-free{background:#f0fdf4;border-color:#86efac;color:#166534}
.hab-occ{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.hab-num{font-size:16px;font-weight:700;margin-bottom:2px}
.hab-tipo{font-size:11px;opacity:.8}

/* RES LIST */
.rlist{display:flex;flex-direction:column;gap:9px}
.rc{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:13px 15px;display:flex;align-items:flex-start;gap:11px;transition:border-color .15s}
.rc.editable{cursor:pointer}.rc.editable:hover{border-color:#93c5fd}
.rbadge{background:var(--accent);color:#fff;border-radius:7px;padding:5px 10px;font-size:13px;font-weight:700;min-width:42px;text-align:center;white-space:nowrap;flex-shrink:0}
.ri{flex:1;min-width:0}
.rn{font-size:15px;font-weight:600;color:var(--ink)}
.rm{font-size:13px;color:var(--ink3);margin-top:3px;line-height:1.5}
.rc-actions{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0}
.dep-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.dep-si{background:#d1fae5;color:#065f46}.dep-no{background:#fee2e2;color:#991b1b}

/* BUTTONS */
.bp{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.bp:hover{background:var(--accent2)}
.bs{background:none;border:.5px solid var(--border);color:var(--ink2);border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;font-family:inherit}
.bs:hover{background:var(--border)}
.bd{background:none;border:.5px solid #fca5a5;color:var(--danger);border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;font-family:inherit}
.bd:hover{background:#fef2f2}
.bicon{background:none;border:none;cursor:pointer;padding:5px;border-radius:7px;color:var(--ink3);font-size:18px;display:flex;align-items:center;justify-content:center}
.bicon:hover{background:var(--border);color:var(--ink)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
@media(min-width:600px){.ov{align-items:center;padding:16px}}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:95vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.15)}
@media(min-width:600px){.modal{border-radius:16px;max-height:92vh}}
.mhead{padding:16px 18px 13px;border-bottom:.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mtitle{font-size:17px;font-weight:700;color:var(--ink)}
.msub{font-size:13px;color:var(--ink3);margin-top:2px}
.xbtn{background:none;border:none;font-size:20px;color:var(--ink3);cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;flex-shrink:0}
.xbtn:hover{background:var(--border)}
.mbody{padding:16px 18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:15px;color:var(--ink);background:#fafafa;outline:none;font-family:inherit;transition:border-color .12s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:#fff}
.field textarea{resize:vertical;min-height:70px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfoot{padding:12px 18px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:.5px solid var(--border);position:sticky;bottom:0;background:#fff}
.mfoot .ml{margin-right:auto}
.foto-preview{width:100%;max-height:180px;object-fit:cover;border-radius:9px;border:.5px solid var(--border);margin-top:8px;display:none}
.foto-label{display:flex;align-items:center;justify-content:center;gap:7px;border:.5px dashed var(--border);border-radius:9px;padding:14px;cursor:pointer;color:var(--ink3);font-size:14px;transition:all .15s;margin-top:6px}
.foto-label:hover{border-color:var(--accent);color:var(--accent);background:#eff6ff}

/* VOUCHER */
.voucher-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.voucher-head{background:var(--accent);color:#fff;padding:20px 22px;text-align:center}
.voucher-head h2{font-size:22px;font-weight:700;letter-spacing:.5px}
.voucher-head p{font-size:13px;opacity:.85;margin-top:4px}
.voucher-body{padding:20px 22px}
.v-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:.5px solid #f0f0f0;gap:10px}
.v-row:last-child{border-bottom:none}
.v-label{font-size:13px;color:#666;font-weight:500;flex-shrink:0}
.v-val{font-size:14px;color:#1a1a2e;font-weight:600;text-align:right}
.voucher-foto{width:100%;border-radius:9px;margin-top:12px;border:.5px solid #e0e0e0}
.voucher-foot{background:#f8f8fc;padding:14px 22px;text-align:center;font-size:12px;color:#999}
.share-actions{display:flex;gap:8px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.btn-wa{background:#25d366;color:#fff;border:none;border-radius:9px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px}
.btn-wa:hover{background:#128c7e}
.btn-dl{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* LOGIN MODAL */
.login-box{background:#fff;border-radius:16px;width:100%;max-width:340px;padding:28px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-icon{font-size:36px;margin-bottom:10px}
.login-title{font-size:18px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--ink3);margin-bottom:20px}
.login-err{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px}

/* CONFIG */
.cfg-wrap{background:var(--card);border:.5px solid var(--border);border-radius:var(--r);padding:18px;max-width:400px;margin:0 auto}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 20px;border-radius:9px;font-size:14px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}

.empty{text-align:center;padding:22px;color:var(--ink3);font-size:14px}
.section-label{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

@media(max-width:599px){
  .cal-desktop{display:none}
  .cal-mobile{display:block}
  .r2{grid-template-columns:1fr}
  .topbar{padding:10px 14px}
  .main{padding:12px 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">📋 Reservas</div>
  <div class="topbar-right">
    <div class="sync"><div class="sdot" id="sd"></div><span id="sl">Conectando…</span></div>
    <button class="session-btn" id="session-btn" onclick="toggleSession()">🔒 Ingresar</button>
  </div>
</div>

<div class="main">

  <!-- DESKTOP CALENDAR -->
  <div class="cal-wrap cal-desktop">
    <div class="cal-nav">
      <span class="cal-title" id="cal-title"></span>
      <div class="cal-arrows">
        <button class="ca" onclick="cm(-1)">‹</button>
        <button class="ca" onclick="cm(1)">›</button>
      </div>
    </div>
    <div class="cgrid" id="cgrid"></div>
  </div>

  <!-- MOBILE CALENDAR -->
  <div class="cal-mobile">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:17px;font-weight:700" id="cal-title-m"></span>
      <div style="display:flex;gap:6px">
        <button class="ca" onclick="cm(-1)">‹</button>
        <button class="ca" onclick="cm(1)">›</button>
      </div>
    </div>
    <div id="mobile-days"></div>
  </div>

  <!-- DAY PANEL -->
  <div id="day-panel" style="display:none">
    <div class="day-panel">
      <div class="dp-header">
        <div>
          <div class="dp-title" id="dp-title"></div>
          <div class="dp-sub" id="dp-sub"></div>
        </div>
        <button class="bp edit-only" id="btn-nueva" onclick="oRes()" style="display:none">+ Nueva reserva</button>
      </div>
      <div class="section-label">Habitaciones</div>
      <div class="hab-grid" id="hab-grid"></div>
      <div class="section-label" style="margin-top:14px">Reservas del día</div>
      <div class="rlist" id="day-rlist"></div>
    </div>
  </div>

  <!-- CONFIG (hidden) -->
  <div id="cfg-panel" style="display:none">
    <div class="cfg-wrap">
      <div style="font-size:17px;font-weight:700;margin-bottom:16px">⚙️ Configuración</div>
      <div class="field"><label>Contraseña actual</label><input type="password" id="cfg-old" placeholder="••••••"></div>
      <div class="field"><label>Nueva contraseña</label><input type="password" id="cfg-new" placeholder="••••••"></div>
      <div class="field"><label>Confirmar nueva contraseña</label><input type="password" id="cfg-new2" placeholder="••••••"></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="bp" onclick="changePass()">Guardar cambios</button>
        <button class="bs" onclick="hideCfg()">Cancelar</button>
      </div>
    </div>
  </div>

</div>

<!-- MODAL RESERVA -->
<div class="ov" id="mres" style="display:none" onclick="bc(event,'mres')">
<div class="modal">
  <div class="mhead">
    <div><div class="mtitle" id="mres-t">Nueva reserva</div><div class="msub" id="mres-s"></div></div>
    <button class="xbtn" onclick="cm2('mres')">✕</button>
  </div>
  <div class="mbody">
    <div class="field">
      <label>Habitación</label>
      <select id="f-hab" onchange="updateTarifa()"></select>
    </div>
    <div class="field">
      <label>Tarifa (S/) — editable</label>
      <input type="number" id="f-tarifa" placeholder="0.00" min="0" step="0.5">
    </div>
    <div class="field">
      <label>Nombre del huésped</label>
      <input type="text" id="f-nombre" placeholder="Nombre completo">
    </div>
    <div class="field">
      <label>Número de contacto</label>
      <input type="tel" id="f-contacto" placeholder="Teléfono o WhatsApp">
    </div>
    <div class="field">
      <label>Fecha de llegada</label>
      <input type="date" id="f-llegada">
    </div>
    <div class="field">
      <label>Quién atendió</label>
      <input type="text" id="f-atencion" placeholder="Nombre de quien registra">
    </div>
    <div style="border:.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="font-size:14px;font-weight:600;color:var(--ink2);margin-bottom:10px">Depósito</div>
      <div class="r2">
        <div class="field" style="margin:0">
          <label>Monto (S/)</label>
          <input type="number" id="f-dep-monto" placeholder="0.00" min="0" step="0.5">
        </div>
        <div class="field" style="margin:0">
          <label>Fecha del depósito</label>
          <input type="date" id="f-dep-fecha">
        </div>
      </div>
      <div class="field" style="margin-top:10px;margin-bottom:0">
        <label>Captura / foto del pago</label>
        <input type="file" id="f-dep-foto" accept="image/*" style="display:none" onchange="previewFoto(this)">
        <label for="f-dep-foto" class="foto-label" id="foto-label">📷 Tocar para adjuntar imagen</label>
        <img id="foto-preview" class="foto-preview">
      </div>
    </div>
    <div class="field">
      <label>Notas (opcional)</label>
      <textarea id="f-notas" placeholder="Observaciones adicionales…"></textarea>
    </div>
  </div>
  <div class="mfoot">
    <div class="ml"><button class="bd" id="res-del-btn" style="display:none" onclick="delRes()">Eliminar</button></div>
    <button class="bs" onclick="cm2('mres')">Cancelar</button>
    <button class="bp" onclick="sRes()">Guardar reserva</button>
  </div>
</div>
</div>

<!-- MODAL VER RESERVA -->
<div class="ov" id="mver" style="display:none" onclick="bc(event,'mver')">
<div class="modal">
  <div class="mhead">
    <div><div class="mtitle">Detalle de reserva</div></div>
    <button class="xbtn" onclick="cm2('mver')">✕</button>
  </div>
  <div class="mbody">
    <div id="voucher-content"></div>
    <div class="share-actions">
      <button class="btn-wa" onclick="shareWA()">📲 Compartir WhatsApp</button>
      <button class="btn-dl" onclick="downloadImg()">⬇ Descargar imagen</button>
      <button class="bp edit-only" id="ver-edit-btn" onclick="editFromVer()" style="display:none;background:#6b7280">✏️ Editar</button>
    </div>
  </div>
</div>
</div>

<!-- MODAL LOGIN -->
<div class="ov" id="mlogin" style="display:none" onclick="bc(event,'mlogin')">
<div class="login-box">
  <div class="login-icon">🔐</div>
  <div class="login-title">Acceso de edición</div>
  <div class="login-sub">Ingresá la contraseña para poder editar</div>
  <div class="field"><input type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()"></div>
  <button class="bp" style="width:100%;justify-content:center" onclick="doLogin()">Ingresar</button>
  <div class="login-err" id="login-err"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ============ CONFIG ============
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVeboE98y29q2mOlpKd8-AnHQ1RQty9U_yxgyBcUnmbcF_2fLmbKBLruSSUdfgNxJr/exec';

const HABITACIONES = [
  {num:'201',tipo:'Matrimonial',tarifa:75},{num:'202',tipo:'Matrimonial',tarifa:75},
  {num:'204',tipo:'Matrimonial',tarifa:75},{num:'205',tipo:'Matrimonial',tarifa:75},
  {num:'206',tipo:'Matrimonial',tarifa:75},{num:'207',tipo:'Matrimonial',tarifa:75},
  {num:'208',tipo:'Matrimonial',tarifa:75},{num:'209',tipo:'Matrimonial',tarifa:75},
  {num:'306',tipo:'Matrimonial',tarifa:75},{num:'307',tipo:'Matrimonial',tarifa:75},
  {num:'305',tipo:'Matrimonial',tarifa:75},
  {num:'310',tipo:'Matrimonial c/ baño privado',tarifa:65},
  {num:'308',tipo:'Matrimonial c/ baño compartido',tarifa:45},
  {num:'311',tipo:'Matrimonial c/ baño compartido',tarifa:45},
  {num:'312',tipo:'Matrimonial c/ baño compartido',tarifa:45},
  {num:'203',tipo:'Triple',tarifa:90},{num:'304',tipo:'Triple',tarifa:90},
  {num:'301',tipo:'Doble',tarifa:75},
  {num:'210',tipo:'Individual sin ducha',tarifa:40},
  {num:'302',tipo:'Individual c/ baño compartido',tarifa:35},
  {num:'303',tipo:'Individual c/ baño compartido',tarifa:35},
  {num:'309',tipo:'Individual c/ baño compartido',tarifa:35},
];

const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

let reservas=[];
let cMonth=new Date().getMonth(), cYear=new Date().getFullYear();
let selDay=null, editResId=null, verResId=null;
let isLoggedIn=false, failCount=0, syncTmr=null;
let fotoBase64=null;

const today=toStr(new Date());

function pad(n){return String(n).padStart(2,'0')}
function toStr(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function fmt(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

// ============ SESSION ============
function initSession(){
  isLoggedIn = localStorage.getItem('hotel_session')==='1';
  updateSessionUI();
}

function updateSessionUI(){
  const btn=document.getElementById('session-btn');
  if(isLoggedIn){
    btn.textContent='🔓 Sesión activa';
    btn.classList.add('active');
  } else {
    btn.textContent='🔒 Ingresar';
    btn.classList.remove('active');
  }
  document.querySelectorAll('.edit-only').forEach(el=>{
    el.style.display=isLoggedIn?'':'none';
  });
  if(isLoggedIn && document.getElementById('btn-nueva')){
    document.getElementById('btn-nueva').style.display='';
  }
}

function toggleSession(){
  if(isLoggedIn){
    if(confirm('¿Cerrar sesión?')){
      isLoggedIn=false;
      localStorage.removeItem('hotel_session');
      updateSessionUI();
      hideCfg();
      toast('Sesión cerrada');
    }
  } else {
    document.getElementById('login-pass').value='';
    document.getElementById('login-err').textContent='';
    document.getElementById('mlogin').style.display='flex';
    setTimeout(()=>document.getElementById('login-pass').focus(),100);
  }
}

async function doLogin(){
  if(failCount>=5){toast('Demasiados intentos. Recargá la página.');return}
  const pass=document.getElementById('login-pass').value;
  if(!pass){return}
  ss('load','Verificando…');
  const ok=await apiP({action:'verificarPass',pass:hashSimple(pass)});
  if(ok?.ok){
    isLoggedIn=true;
    localStorage.setItem('hotel_session','1');
    failCount=0;
    cm2('mlogin');
    updateSessionUI();
    ss('ok','Conectado');
    toast('Sesión iniciada ✓');
  } else {
    failCount++;
    const restantes=5-failCount;
    document.getElementById('login-err').textContent=
      restantes>0?`Contraseña incorrecta. ${restantes} intento${restantes!==1?'s':''} restante${restantes!==1?'s':''}.`:'Cuenta bloqueada. Recargá la página.';
    ss('ok','Conectado');
  }
}

function hashSimple(str){
  let hash=0;
  for(let i=0;i<str.length;i++){hash=((hash<<5)-hash)+str.charCodeAt(i);hash|=0}
  return Math.abs(hash).toString(16);
}

// ============ SYNC ============
function ss(st,lbl){
  const d=document.getElementById('sd'),l=document.getElementById('sl');
  if(d)d.className='sdot '+st;if(l)l.textContent=lbl;
}

async function apiG(a){
  try{const r=await fetch(`${SCRIPT_URL}?action=${a}`);return await r.json()}
  catch{return null}
}

async function apiP(b){
  try{const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(b)});return await r.json()}
  catch{return null}
}

async function loadAll(){
  ss('load','Sincronizando…');
  const raw=await apiG('getReservas');
  if(!raw){
    ss('err','Sin conexión — datos locales');
    reservas=JSON.parse(localStorage.getItem('hr_reservas')||'[]');
    renderAll();return;
  }
  reservas=(raw||[]).filter(r=>r[0]&&r[0]!=='id').map(r=>({
    id:r[0],hab:r[1],tipo:r[2],tarifa:r[3],nombre:r[4],
    contacto:r[5],llegada:r[6],atencion:r[7],
    depMonto:r[8],depFecha:r[9],depFoto:r[10],notas:r[11]
  }));
  localStorage.setItem('hr_reservas',JSON.stringify(reservas));
  ss('ok',`Sync ${new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})}`);
  renderAll();
}

function startSync(){
  if(syncTmr)clearInterval(syncTmr);
  syncTmr=setInterval(loadAll,30000);
}

function renderAll(){
  renderCal();
  renderCalMobile();
  if(selDay)renderDayPanel(selDay);
}

// ============ CALENDAR ============
function renderCal(){
  const t=document.getElementById('cal-title');
  if(t)t.textContent=`${MONTHS[cMonth]} ${cYear}`;
  const grid=document.getElementById('cgrid');if(!grid)return;
  grid.innerHTML=DAYS.map(d=>`<div class="clabel">${d}</div>`).join('');
  const first=new Date(cYear,cMonth,1).getDay();
  const total=new Date(cYear,cMonth+1,0).getDate();
  for(let i=0;i<first;i++)grid.innerHTML+=`<div class="cday empty"></div>`;
  for(let d=1;d<=total;d++){
    const ds=`${cYear}-${pad(cMonth+1)}-${pad(d)}`;
    const dr=resDelDia(ds);
    const past=ds<today;
    const el=document.createElement('div');
    el.className='cday'+(ds===today?' today':'')+(past&&ds!==today?' past':'')+(dr.length?' hasr':'')+(ds===selDay?' sel':'');
    el.innerHTML=`<span class="dn">${d}</span><div class="ddots">${dr.slice(0,5).map(()=>`<div class="ddot" style="background:var(--accent)"></div>`).join('')}</div>`;
    if(!past||ds===today)el.onclick=()=>selectDay(ds);
    grid.appendChild(el);
  }
}

function renderCalMobile(){
  const t=document.getElementById('cal-title-m');
  if(t)t.textContent=`${MONTHS[cMonth]} ${cYear}`;
  const cont=document.getElementById('mobile-days');if(!cont)return;
  const total=new Date(cYear,cMonth+1,0).getDate();
  let html='';
  for(let d=1;d<=total;d++){
    const ds=`${cYear}-${pad(cMonth+1)}-${pad(d)}`;
    const dr=resDelDia(ds);
    const past=ds<today;
    const dayName=DAYS[new Date(ds).getDay()];
    const isToday=ds===today;
    const isSel=ds===selDay;
    if(past&&!isToday)continue;
    html+=`<div class="day-row${isToday?' today-row':''}${isSel?' sel-row':''}" onclick="selectDay('${ds}')">
      <div>
        <div class="day-label">${dayName} ${d} ${MONTHS[cMonth].slice(0,3)}</div>
        <div class="day-sub">${dr.length?`${dr.length} reserva${dr.length!==1?'s':''}`:'Sin reservas'}</div>
      </div>
      <div class="day-dots-row">${dr.slice(0,5).map(()=>`<div class="ddot" style="background:var(--accent);width:8px;height:8px"></div>`).join('')}
      <span style="color:var(--ink3);font-size:18px">›</span></div>
    </div>`;
  }
  cont.innerHTML=html||`<div class="empty">No hay días disponibles este mes</div>`;
}

function cm(d){
  cMonth+=d;
  if(cMonth>11){cMonth=0;cYear++}
  if(cMonth<0){cMonth=11;cYear--}
  selDay=null;
  document.getElementById('day-panel').style.display='none';
  renderCal();renderCalMobile();
}

function selectDay(ds){
  selDay=ds;
  renderCal();renderCalMobile();
  renderDayPanel(ds);
  document.getElementById('day-panel').style.display='';
  document.getElementById('day-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function resDelDia(ds){
  return reservas.filter(r=>r.llegada===ds);
}

// ============ DAY PANEL ============
function renderDayPanel(ds){
  const[y,m,d]=ds.split('-');
  const label=`${parseInt(d)} de ${MONTHS[parseInt(m)-1]} ${y}`;
  const dr=resDelDia(ds);
  const habsOcupadas=new Set(dr.map(r=>r.hab));

  document.getElementById('dp-title').textContent=label;
  document.getElementById('dp-sub').textContent=`${dr.length} reserva${dr.length!==1?'s':''} · ${HABITACIONES.length-habsOcupadas.size} habitaciones disponibles`;

  if(isLoggedIn){
    document.getElementById('btn-nueva').style.display='';
  }

  // Hab grid
  const hgrid=document.getElementById('hab-grid');
  hgrid.innerHTML=HABITACIONES.map(h=>{
    const occ=habsOcupadas.has(h.num);
    return`<div class="hab-chip ${occ?'hab-occ':'hab-free'}">
      <div class="hab-num">${h.num}</div>
      <div class="hab-tipo">${occ?'Ocupada':'Libre'}</div>
    </div>`;
  }).join('');

  // Res list
  const rl=document.getElementById('day-rlist');
  if(!dr.length){rl.innerHTML=`<div class="empty">Sin reservas para este día</div>`;return}
  rl.innerHTML=dr.map(r=>`
    <div class="rc${isLoggedIn?' editable':''}" onclick="verRes('${r.id}')">
      <div class="rbadge">${r.hab}</div>
      <div class="ri">
        <div class="rn">${r.nombre||'Sin nombre'}</div>
        <div class="rm">${r.tipo} · S/ ${r.tarifa} · 📞 ${r.contacto||'—'}<br>Atendió: ${r.atencion||'—'}</div>
      </div>
      <div class="rc-actions">
        <span class="dep-badge ${r.depMonto?'dep-si':'dep-no'}">${r.depMonto?`S/ ${r.depMonto}`:'Sin depósito'}</span>
      </div>
    </div>`).join('');
}

// ============ MODAL RESERVA ============
function populateHabs(selHab){
  const s=document.getElementById('f-hab');
  s.innerHTML=HABITACIONES.map(h=>`<option value="${h.num}" data-tarifa="${h.tarifa}" ${h.num===selHab?'selected':''}>${h.num} — ${h.tipo} (S/ ${h.tarifa})</option>`).join('');
}

function updateTarifa(){
  const sel=document.getElementById('f-hab');
  const opt=sel.options[sel.selectedIndex];
  document.getElementById('f-tarifa').value=opt.dataset.tarifa||'';
}

function oRes(id){
  if(!isLoggedIn){toast('Iniciá sesión para editar');return}
  editResId=id||null;
  fotoBase64=null;
  document.getElementById('foto-preview').style.display='none';
  document.getElementById('foto-preview').src='';
  document.getElementById('foto-label').style.display='flex';
  ['f-nombre','f-contacto','f-llegada','f-atencion','f-dep-monto','f-dep-fecha','f-notas'].forEach(x=>document.getElementById(x).value='');
  populateHabs(null);
  updateTarifa();

  if(id){
    const r=reservas.find(x=>x.id===id);if(!r)return;
    document.getElementById('mres-t').textContent='Editar reserva';
    document.getElementById('mres-s').textContent=`Hab. ${r.hab} · ${r.nombre}`;
    document.getElementById('res-del-btn').style.display='';
    populateHabs(r.hab);
    document.getElementById('f-tarifa').value=r.tarifa||'';
    document.getElementById('f-nombre').value=r.nombre||'';
    document.getElementById('f-contacto').value=r.contacto||'';
    document.getElementById('f-llegada').value=r.llegada||'';
    document.getElementById('f-atencion').value=r.atencion||'';
    document.getElementById('f-dep-monto').value=r.depMonto||'';
    document.getElementById('f-dep-fecha').value=r.depFecha||'';
    document.getElementById('f-notas').value=r.notas||'';
    if(r.depFoto){
      fotoBase64=r.depFoto;
      document.getElementById('foto-preview').src=r.depFoto;
      document.getElementById('foto-preview').style.display='block';
      document.getElementById('foto-label').style.display='none';
    }
  } else {
    document.getElementById('mres-t').textContent='Nueva reserva';
    document.getElementById('mres-s').textContent=selDay?`Llegada: ${fmt(selDay)}`:'';
    document.getElementById('res-del-btn').style.display='none';
    if(selDay)document.getElementById('f-llegada').value=selDay;
    document.getElementById('f-dep-fecha').value=today;
  }
  document.getElementById('mres').style.display='flex';
}

function previewFoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    fotoBase64=e.target.result;
    document.getElementById('foto-preview').src=fotoBase64;
    document.getElementById('foto-preview').style.display='block';
    document.getElementById('foto-label').style.display='none';
  };
  reader.readAsDataURL(file);
}

async function sRes(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const hab=document.getElementById('f-hab').value;
  const llegada=document.getElementById('f-llegada').value;
  if(!nombre){toast('Ingresá el nombre del huésped');return}
  if(!hab){toast('Seleccioná una habitación');return}
  if(!llegada){toast('Ingresá la fecha de llegada');return}

  const habInfo=HABITACIONES.find(h=>h.num===hab);
  const res={
    id:editResId||uid(),
    hab,
    tipo:habInfo?.tipo||'',
    tarifa:document.getElementById('f-tarifa').value||habInfo?.tarifa||'',
    nombre,
    contacto:document.getElementById('f-contacto').value.trim(),
    llegada,
    atencion:document.getElementById('f-atencion').value.trim(),
    depMonto:document.getElementById('f-dep-monto').value||'',
    depFecha:document.getElementById('f-dep-fecha').value||'',
    depFoto:fotoBase64||'',
    notas:document.getElementById('f-notas').value.trim(),
  };

  if(editResId){const i=reservas.findIndex(x=>x.id===editResId);reservas[i]=res}
  else reservas.push(res);
  localStorage.setItem('hr_reservas',JSON.stringify(reservas));
  cm2('mres');renderAll();
  ss('load','Guardando…');
  const ok=await apiP({action:'saveReserva',data:res});
  ss(ok?.ok?'ok':'err',ok?.ok?`Sync ${new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})}`:'Error al guardar');
  toast(ok?.ok?'Reserva guardada ✓':'Guardado localmente');
}

async function delRes(){
  if(!confirm('¿Eliminar esta reserva?'))return;
  reservas=reservas.filter(x=>x.id!==editResId);
  localStorage.setItem('hr_reservas',JSON.stringify(reservas));
  cm2('mres');renderAll();
  await apiP({action:'deleteReserva',id:editResId});
  toast('Reserva eliminada');
}

// ============ VER / VOUCHER ============
function verRes(id){
  verResId=id;
  const r=reservas.find(x=>x.id===id);if(!r)return;
  const editBtn=document.getElementById('ver-edit-btn');
  if(editBtn)editBtn.style.display=isLoggedIn?'':'none';

  document.getElementById('voucher-content').innerHTML=`
    <div class="voucher-wrap" id="voucher-render">
      <div class="voucher-head">
        <h2>RESERVA</h2>
        <p>Comprobante de reserva</p>
      </div>
      <div class="voucher-body">
        <div class="v-row"><span class="v-label">Habitación</span><span class="v-val">${r.hab} — ${r.tipo}</span></div>
        <div class="v-row"><span class="v-label">Tarifa</span><span class="v-val">S/ ${r.tarifa}</span></div>
        <div class="v-row"><span class="v-label">Huésped</span><span class="v-val">${r.nombre}</span></div>
        <div class="v-row"><span class="v-label">Contacto</span><span class="v-val">${r.contacto||'—'}</span></div>
        <div class="v-row"><span class="v-label">Fecha de llegada</span><span class="v-val">${fmt(r.llegada)}</span></div>
        <div class="v-row"><span class="v-label">Depósito</span><span class="v-val">${r.depMonto?`S/ ${r.depMonto}`:'Sin depósito'}</span></div>
        <div class="v-row"><span class="v-label">Fecha depósito</span><span class="v-val">${fmt(r.depFecha)}</span></div>
        <div class="v-row"><span class="v-label">Atendió</span><span class="v-val">${r.atencion||'—'}</span></div>
        ${r.notas?`<div class="v-row"><span class="v-label">Notas</span><span class="v-val">${r.notas}</span></div>`:''}
        ${r.depFoto?`<img src="${r.depFoto}" class="voucher-foto">`:''}
      </div>
      <div class="voucher-foot">Generado el ${fmt(today)}</div>
    </div>`;
  document.getElementById('mver').style.display='flex';
}

function editFromVer(){
  cm2('mver');
  oRes(verResId);
}

async function shareWA(){
  const el=document.getElementById('voucher-render');
  if(!el)return;
  toast('Generando imagen…');
  try{
    const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    canvas.toBlob(async blob=>{
      const r=reservas.find(x=>x.id===verResId);
      const text=`*RESERVA*\nHab. ${r?.hab||''} — ${r?.nombre||''}\nLlegada: ${fmt(r?.llegada||'')}\nDepósito: ${r?.depMonto?`S/ ${r.depMonto}`:'Sin depósito'}`;
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],'reserva.png',{type:'image/png'})]})){
        await navigator.share({files:[new File([blob],'reserva.png',{type:'image/png'})],text});
      } else {
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download='reserva.png';a.click();
        URL.revokeObjectURL(url);
        toast('Imagen descargada — compartí desde tu galería');
      }
    },'image/png');
  }catch(e){toast('Error al generar imagen')}
}

async function downloadImg(){
  const el=document.getElementById('voucher-render');if(!el)return;
  toast('Generando imagen…');
  try{
    const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true});
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download='reserva.png';a.click();
    toast('Imagen descargada ✓');
  }catch(e){toast('Error al generar imagen')}
}

// ============ CONFIG / PASS ============
function hideCfg(){
  document.getElementById('cfg-panel').style.display='none';
}

async function changePass(){
  const old=document.getElementById('cfg-old').value;
  const n1=document.getElementById('cfg-new').value;
  const n2=document.getElementById('cfg-new2').value;
  if(!old||!n1||!n2){toast('Completá todos los campos');return}
  if(n1!==n2){toast('Las contraseñas nuevas no coinciden');return}
  if(n1.length<6){toast('La contraseña debe tener al menos 6 caracteres');return}
  ss('load','Verificando…');
  const ok=await apiP({action:'cambiarPass',oldHash:hashSimple(old),newHash:hashSimple(n1)});
  if(ok?.ok){
    toast('Contraseña actualizada ✓');
    ['cfg-old','cfg-new','cfg-new2'].forEach(x=>document.getElementById(x).value='');
    hideCfg();
  } else {
    toast('Contraseña actual incorrecta');
  }
  ss('ok','Conectado');
}

// ============ UTILS ============
function cm2(id){document.getElementById(id).style.display='none'}
function bc(e,id){if(e.target.id===id)cm2(id)}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ============ INIT ============
initSession();
loadAll();
startSync();
</script>
